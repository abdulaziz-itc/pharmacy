name: pharmarep
description: "PharmaRep - Medical Representatives App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP
  dio: ^5.4.3+1

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.0

  # Fonts
  google_fonts: ^6.2.1

  # Charts
  fl_chart: ^0.68.0

  # Shimmer loading
  shimmer: ^3.0.0

  # Internationalization
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

  # Cached network image
  cached_network_image: ^3.3.1

  # URL launcher
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
